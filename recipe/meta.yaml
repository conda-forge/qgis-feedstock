{% set version = "4.0.0" %}

package:
  name: qgis
  version: {{ version }}

source:
  url: https://qgis.org/downloads/qgis-{{ version }}.tar.bz2
  sha256: b07377af3193cc980c03f6e0022d028590ece6d0e85d04fee03e8761472484f3
  patches:
    - 0001-fix-protobuf-23.patch
    - 0002-skip-dot-in-path.patch  # [win]
    - 0005-check-locks-not-destroyed.patch
    - 0006-use-entrypoints.patch

build:
  number: 0
  # pyproj no longer supports py310
  skip: true  # [py2k or py<311]

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cmake
    - ninja
    - m2-flex  # [win]
    - m2-bison  # [win]
    - m2-m4  # [win]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
    - sip                                # [build_platform != target_platform]
    - pyqt-builder                       # [build_platform != target_platform]
    - pyqt6-sip                          # [build_platform != target_platform]
    - pyqt6                              # [build_platform != target_platform]
    - qscintilla2                        # [build_platform != target_platform]
    - pkgconfig                          # [build_platform != target_platform]
    - flex                               # [unix and (build_platform != target_platform)]
    - bison                              # [unix and (build_platform != target_platform)]
    - m4                                 # [unix and (build_platform != target_platform)]
    - libpdal                            # [build_platform != target_platform]
    - libprotobuf                        # [build_platform != target_platform]
  host:
    - lldb                               # [osx]
    - setuptools
    - sip
    - python                             # [build_platform == target_platform]
    - six
    - flex                               # [unix]
    - bison                              # [unix]
    - m4                                 # [unix]
    - pkgconfig
    - expat
    - icu
    - libzip
    - libprotobuf
    - libtasn1                           # [osx]
    - exiv2
    # Qt stack.
    - qt6-main
    - pyqt6                              # [build_platform == target_platform]
    - pyqt6-sip                          # [build_platform == target_platform]
    - pyqt-builder                       # [build_platform == target_platform]
    - qscintilla2
    - qca
    - qjson
    - qwt
    - qtkeychain
    # GDAL stack.
    - libgdal
    - gdal
    - geos
    - proj
    # GSL for georeferencer.
    - gsl
    - sqlite
    - libspatialindex 2.0
    - libspatialite
    # For PostgreSQL support.
    - postgresql
    - psycopg2
    # Point Clouds. Need only C/C++ package
    - libpdal
    - laz-perf
    - ocl-icd                                # [linux]
    - khronos-opencl-icd-loader              # [win or osx]
    - libgl-devel                            # [linux]
    - libegl-devel                           # [linux]
    - libopengl-devel                        # [linux]
    - xorg-xorgproto                         # [linux]
    - xcb-util                               # [linux]
    - xcb-util-wm                            # [linux]
    - xcb-util-keysyms                       # [linux]
    - xcb-util-image                         # [linux]
    - xcb-util-renderutil                    # [linux]
    - xorg-libx11                            # [linux]
    - xorg-libxext                           # [linux]
    - xorg-libxdamage                        # [linux]
    - xorg-libsm                             # [linux]
    - xorg-libice                            # [linux]
    - xorg-libxcomposite                     # [linux]
    - xorg-libxxf86vm                        # [linux]
    - xorg-xf86vidmodeproto                  # [linux]
  run:
    - python
    - icu
    - libzip
    - libtasn1                               # [osx]
    - qt6-main
    - pyqt6
    - pyqt6-sip
    - qscintilla2
    - qca
    - qjson
    - qwt
    - qtkeychain
    - libgdal
    - gdal
    - geos
    - proj
    - gsl
    - sqlite
    - libspatialindex 2.0
    - libspatialite
    - psycopg2
    - postgresql
    - exiv2
    - libprotobuf
    # Runtime Python library deps
    - python-dateutil
    - future
    - httplib2
    - jinja2
    - markupsafe
    - mock
    - nose2
    - plotly
    - pygments
    - pyproj
    - requests
    - six
    - pytz
    - pyyaml
    - yaml
    - owslib
    - libpdal
    - laz-perf
    - ocl-icd                                # [linux]
    - khronos-opencl-icd-loader              # [win or osx]

test:
  files:
    - test_data
    - test_py_qgis.py
  commands:
    - {{ RECIPE_DIR }}/run_test.bat          # [win]
    - bash {{ RECIPE_DIR }}/run_test.sh      # [not win]

about:
  home: http://qgis.org/
  license: GPL-2.0-only
  license_file: COPYING
  summary: A free and open source Geographic Information System (GIS).
  description: |
    QGIS is a user friendly Open Source Geographic Information System (GIS)
    licensed under the GNU General Public License. QGIS is an official
    project of the Open Source Geospatial Foundation (OSGeo). It runs on
    Linux, Unix, Mac OSX, Windows and Android and supports numerous vector,
    raster, and database formats and functionalities.
  doc_url: https://www.qgis.org/en/docs/index.html
  dev_url: https://github.com/qgis/QGIS

extra:
  recipe-maintainers:
    - ceholden
    - ocefpaf
    - kmuehlbauer
    - SrNetoChan
    - gillins
    - izahn
